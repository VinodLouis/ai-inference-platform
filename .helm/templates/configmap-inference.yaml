apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aip.fullname" . }}-inference
  labels:
    {{- include "aip.labels" . | nindent 4 }}
data:
  common.json: |
    {
      "debug": {{ ternary 1 0 .Values.global.debug }},
      "modelWorkerRpcKey": {{ .Values.inference.modelWorkerRpcKey | quote }},
      "modelRequestTimeoutMs": {{ .Values.inference.modelRequestTimeoutMs | default 180000 }}
    }
