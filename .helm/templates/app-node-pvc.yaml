{{- if .Values.appNode.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aip.fullname" . }}-app-node-pvc
  labels:
    {{- include "aip.labels" . | nindent 4 }}
    app.kubernetes.io/component: app-node
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.appNode.persistence.size }}
  {{- if .Values.appNode.persistence.storageClassName }}
  storageClassName: {{ .Values.appNode.persistence.storageClassName }}
  {{- end }}
{{- end }}
